name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          python -m pytest harness/ -q --tb=short

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint with ruff
        run: |
          ruff check . --ignore=E501,W291 --exclude=__pycache__,.git,venv,node_modules || true

      - name: Check imports
        run: |
          python -c "
          import importlib, sys
          from pathlib import Path
          errors = []
          for f in Path('.').rglob('*.py'):
              if '.git' in str(f) or '__pycache__' in str(f) or 'venv' in str(f):
                  continue
              mod = str(f).replace('/', '.').replace('\\\\', '.').removesuffix('.py')
              try:
                  importlib.import_module(mod)
              except Exception as e:
                  errors.append(f'{f}: {e}')
          if errors:
              for e in errors[:20]:
                  print(e)
          " || true
