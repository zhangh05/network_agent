name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          python -m pytest harness/ -q --tb=short

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint with ruff
        run: |
          ruff check . --ignore=E501,W291 --exclude=__pycache__,.git,venv,node_modules || true
      - name: Check CSS tokens
        run: |
          python scripts/check_css_tokens.py

      - name: Check imports
        run: |
          python -c "
          import importlib, sys
          from pathlib import Path
          errors = []
          for f in Path('.').rglob('*.py'):
              if '.git' in str(f) or '__pycache__' in str(f) or 'venv' in str(f):
                  continue
              mod = str(f).replace('/', '.').replace('\\\\', '.').removesuffix('.py')
              try:
                  importlib.import_module(mod)
              except Exception as e:
                  errors.append(f'{f}: {e}')
          if errors:
              for e in errors[:20]:
                  print(e)
          " || true

  windows-smoke:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate Windows scripts and shell routing
        shell: pwsh
        run: |
          python -m pip install pytest
          $tokens = $null
          $errors = $null
          [void][System.Management.Automation.Language.Parser]::ParseFile(
            (Resolve-Path "start.ps1"), [ref]$tokens, [ref]$errors
          )
          if ($errors.Count -gt 0) { $errors | Format-List; exit 1 }
          $tokens = $null
          $errors = $null
          [void][System.Management.Automation.Language.Parser]::ParseFile(
            (Resolve-Path "stop.ps1"), [ref]$tokens, [ref]$errors
          )
          if ($errors.Count -gt 0) { $errors | Format-List; exit 1 }
          python -m pytest harness/test_windows_runtime_contract.py -q
