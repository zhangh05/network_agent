name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows-package:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        id: python312
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Python 3.13
        id: python313
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        shell: pwsh
        run: |
          npm --prefix frontend ci
          npm --prefix frontend run build

      - name: Build offline Python dependency cache
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force wheelhouse | Out-Null
          & "${{ steps.python312.outputs.python-path }}" -m pip download --only-binary=:all: --dest wheelhouse -r requirements.txt
          & "${{ steps.python313.outputs.python-path }}" -m pip download --only-binary=:all: --dest wheelhouse -r requirements.txt

      - name: Verify dependency cache offline
        shell: pwsh
        run: |
          foreach ($runtime in @(
            @{ Name = "3.12"; Python = "${{ steps.python312.outputs.python-path }}" },
            @{ Name = "3.13"; Python = "${{ steps.python313.outputs.python-path }}" }
          )) {
            $venv = Join-Path $env:RUNNER_TEMP "network-agent-wheelhouse-$($runtime.Name)"
            $runtimePython = $runtime.Python
            & $runtimePython -m venv $venv
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            $python = Join-Path $venv "Scripts/python.exe"
            & $python -m pip install --disable-pip-version-check --no-index --find-links wheelhouse -r requirements.txt
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            & $python -m pip check
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            & $python -c "import flask, flask_sock, yaml, bs4, lxml, pdfplumber, scapy, paramiko"
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }

      - name: Validate Windows launch scripts
        shell: pwsh
        run: |
          $tokens = $null
          $errors = $null
          [void][System.Management.Automation.Language.Parser]::ParseFile(
            (Resolve-Path "start.ps1"), [ref]$tokens, [ref]$errors
          )
          if ($errors.Count -gt 0) { $errors | Format-List; exit 1 }
          .\start.ps1 -NoBrowser -ValidateOnly
          $tokens = $null
          $errors = $null
          [void][System.Management.Automation.Language.Parser]::ParseFile(
            (Resolve-Path "stop.ps1"), [ref]$tokens, [ref]$errors
          )
          if ($errors.Count -gt 0) { $errors | Format-List; exit 1 }

      - name: Assemble Windows package
        shell: pwsh
        run: |
          $stage = Join-Path $PWD "release/network-agent"
          New-Item -ItemType Directory -Force $stage | Out-Null
          robocopy $PWD $stage /E /XD .git .github .venv .runtime node_modules logs data workspaces reports release frontend\test-results frontend\playwright-report /XF .backend.pid .frontend.pid *.log | Out-Null
          $robocopyExitCode = $LASTEXITCODE
          if ($robocopyExitCode -ge 8) { exit $robocopyExitCode }
          # Robocopy uses 1-7 for successful copy states. Reset the native exit
          # code so GitHub's pwsh wrapper does not mark the step as failed.
          $global:LASTEXITCODE = 0
          $version = "${{ github.ref_name }}"
          Compress-Archive -Path $stage -DestinationPath "release/network-agent-$version-windows-x64.zip" -Force
          exit 0

      - name: Publish release asset
        uses: softprops/action-gh-release@v2
        with:
          files: release/network-agent-*-windows-x64.zip
          generate_release_notes: true
