name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows-package:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        shell: pwsh
        run: |
          npm --prefix frontend ci
          npm --prefix frontend run build

      - name: Validate Windows launch scripts
        shell: pwsh
        run: |
          $tokens = $null
          $errors = $null
          [void][System.Management.Automation.Language.Parser]::ParseFile(
            (Resolve-Path "start.ps1"), [ref]$tokens, [ref]$errors
          )
          if ($errors.Count -gt 0) { $errors | Format-List; exit 1 }
          $tokens = $null
          $errors = $null
          [void][System.Management.Automation.Language.Parser]::ParseFile(
            (Resolve-Path "stop.ps1"), [ref]$tokens, [ref]$errors
          )
          if ($errors.Count -gt 0) { $errors | Format-List; exit 1 }

      - name: Assemble Windows package
        shell: pwsh
        run: |
          $stage = Join-Path $PWD "release/network-agent"
          New-Item -ItemType Directory -Force $stage | Out-Null
          robocopy $PWD $stage /E /XD .git .github .venv .runtime node_modules logs data workspaces reports release frontend\node_modules frontend\test-results frontend\playwright-report /XF .backend.pid .frontend.pid *.log | Out-Null
          if ($LASTEXITCODE -ge 8) { exit $LASTEXITCODE }
          $version = "${{ github.ref_name }}"
          Compress-Archive -Path $stage -DestinationPath "release/network-agent-$version-windows-x64.zip" -Force

      - name: Publish release asset
        uses: softprops/action-gh-release@v2
        with:
          files: release/network-agent-*-windows-x64.zip
          generate_release_notes: true
