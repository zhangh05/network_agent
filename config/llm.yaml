llm:
  enabled: true
  default_provider: minimax
  safe_mode: true  # Default safe; overridable via llm.local.yaml
  timeout_seconds: 30
  providers:
    minimax:
      type: openai_compatible
      base_url: https://api.minimaxi.com/v1
      api_key_env: MINIMAX_API_KEY
      model: MiniMax-M3
      temperature: 0.2
      max_tokens: 4096
