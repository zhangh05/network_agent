skill_name: config_translation
display_name: 配置翻译
module: config_translation
enabled: true
description: Use the config translation module to translate network device configuration.
skill_doc: skills/config_translation/SKILL.md
adapter: skills/config_translation/adapter.py
entrypoint:
  type: api
  method: POST
  path: /api/translate
input_schema:
  required:
    - source_config
    - source_vendor
    - target_vendor
output_schema:
  required:
    - deployable_config
    - manual_review
    - semantic_near
    - unsupported
    - audit
rules:
  - do_not_modify_deployable_config
  - do_not_use_full_output_as_deployable
  - always_check_manual_review
  - never_hide_high_risk
risk_level: medium
can_generate_deployable: true
