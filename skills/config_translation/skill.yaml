skill_name: config_translation
display_name: 配置翻译技能
description: Agent 调用配置翻译模块的技能适配器
category: translation

status: enabled
skill_type: python_adapter

module: config_translation
module_api: /api/modules/config-translation/translate
adapter_path: skills/config_translation/adapter.py

entrypoint:
  type: python
  function: translate

capabilities:
  - capability_id: config.translate
    intent: translate_config
    description: 将网络设备配置从一个厂商语法转换为另一个厂商语法
    risk_level: medium
  - capability_id: config.review
    intent: context_qa
    description: 人工复核翻译结果中的风险项
    risk_level: low

inputs:
  - source_vendor
  - target_vendor
  - source_config

outputs:
  - deployable_config
  - manual_review
  - semantic_near
  - unsupported
  - audit

execution:
  calls_module: true
  calls_llm: false
  calls_http_self: false

red_lines:
  - do_not_modify_deployable_config
  - do_not_use_full_output_as_deployable
  - do_not_call_llm
  - do_not_hide_manual_review
  - do_not_bypass_translate_bundle
  - do_not_call_legacy_api
  - do_not_call_http_self

trace:
  record_skill_call: true
  record_module_call: true
  record_full_input: false
  record_full_output: false

memory:
  write_run_summary: true
  write_full_input: false
  write_full_output: false

tests:
  required_contract_tests:
    - skill_schema
    - adapter_contract
    - no_llm_contract
    - no_http_self_contract
    - trace_contract
