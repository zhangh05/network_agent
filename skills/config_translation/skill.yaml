skill_name: config_translation
module: config_translation
display_name: 配置翻译
enabled: true
description: Use the config translation module to translate network device configuration across vendors.
entrypoint:
  type: python_adapter
  module: skills.config_translation.adapter
  function: translate
module_api: /api/modules/config-translation/translate
red_lines:
  - do_not_modify_deployable_config
  - do_not_use_full_output_as_deployable
  - do_not_call_llm
  - do_not_hide_manual_review
  - do_not_bypass_translate_bundle
risk_level: medium
can_generate_deployable: true
input_schema:
  required:
    - source_config
    - source_vendor
    - target_vendor
output_schema:
  required:
    - deployable_config
    - manual_review
    - semantic_near
    - unsupported
    - audit
